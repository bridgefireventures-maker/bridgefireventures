<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BridgeFire Ventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;scroll-behavior:smooth}
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;transition:background 0.2s,color 0.2s}
    body.light{background:#f7f5f2;color:#1c1917}
    body.dark{background:#0f0d1a;color:#f0ebe0}
    ::-webkit-scrollbar{width:5px}
    body.light ::-webkit-scrollbar-thumb{background:#d4c9b8;border-radius:3px}
    body.dark ::-webkit-scrollbar-thumb{background:#3a3050;border-radius:3px}
  </style>
</head>
<body class="light">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
